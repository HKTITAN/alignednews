name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attach binaries to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:

  # ────────────────────────────────────────────────────────────────────
  # Windows: build Aligned.App (WinUI 3) as a self-contained published exe
  # ────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore + publish
        shell: pwsh
        working-directory: windows-app/Aligned.App
        run: |
          dotnet publish -c Release -r win-x64 `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishSingleFile=false `
            --self-contained false

      - name: Zip publish output
        shell: pwsh
        run: |
          $src = "windows-app/Aligned.App/bin/Release/net10.0-windows10.0.22621.0/win-x64/publish"
          Compress-Archive -Path "$src/*" -DestinationPath "ALIGNED-windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALIGNED-windows-x64
          path: ALIGNED-windows-x64.zip

  # ────────────────────────────────────────────────────────────────────
  # Android: assemble debug APK (no key signing config required for v0.1)
  # ────────────────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build debug APK
        run: ./gradlew :android-app:assembleDebug

      - name: Rename APK
        run: |
          mkdir -p out
          cp android-app/build/outputs/apk/debug/android-app-debug.apk out/ALIGNED-android-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALIGNED-android-debug
          path: out/ALIGNED-android-debug.apk

  # ────────────────────────────────────────────────────────────────────
  # Attach both artifacts to the GitHub release for the pushed tag.
  # ────────────────────────────────────────────────────────────────────
  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ALIGNED-windows-x64
          path: ./assets

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: ALIGNED-android-debug
          path: ./assets

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            assets/ALIGNED-windows-x64.zip
            assets/ALIGNED-android-debug.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
